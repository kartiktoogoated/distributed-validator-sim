# docker-compose.yml
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: prisma
      POSTGRES_PASSWORD: prisma
      POSTGRES_DB: mydb
    ports:
      - "5430:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"

  # ——— your first validator instance (node A) ———
  validator_a:
    image: validator_a                
    build:
      context: .
      dockerfile: Dockerfile
    container_name: validator_a       
    depends_on:
      - db
      - kafka
      - zookeeper
    ports:
      - "3000:3000"
    env_file:
      - .env.nodeA

  # ——— your second validator instance (node B) ———
  validator_b:
    image: validator_b                
    build:
      context: .
      dockerfile: Dockerfile
    container_name: validator_b       
    depends_on:
      - db
      - kafka
      - zookeeper
    ports:
      - "3001:3000"                   # host 3001 → container 3000
    env_file:
      - .env.nodeB

volumes:
  postgres_data:
